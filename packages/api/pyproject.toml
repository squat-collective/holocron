[project]
name = "holocron"
version = "0.1.0"
description = "A declarative data governance platform for documenting data assets, sources, and lineage"
readme = "README.md"
requires-python = ">=3.12"
license = { text = "MIT" }
authors = [
    { name = "Tom" }
]
keywords = ["data-governance", "data-catalog", "lineage", "neo4j"]

dependencies = [
    "fastapi>=0.115.0",
    "uvicorn[standard]>=0.32.0",
    "pydantic[email]>=2.10.0",
    "pydantic-settings>=2.6.0",
    "neo4j>=5.26.0",
    "slowapi>=0.1.9",
    "python-multipart>=0.0.18",
    # ONNX-based embeddings. Runs on CPU, ships with BGE-small (384-dim,
    # ~130 MB) — fits on an 8 GB server without a GPU. No PyTorch dep.
    "fastembed>=0.4.2",
    # Pure-Python graph layout for the /graph/map endpoint. spring_layout
    # runs once at startup over the full entity graph and the coordinates
    # are cached in-memory — at 1M scale this moves to a periodic batch
    # job, but the API contract (x, y on every node) stays identical.
    "networkx>=3.3",
    "holocron-plugin-sdk",
    "excel-connector",
    "excel-exporter",
    "csv-connector",
    "data-dictionary-markdown",
    "lineage-gap-audit",
    "compliance-report",
    "pii-detector",
    "postgres-connector",
    "powerbi-connector",
]

[tool.uv.sources]
holocron-plugin-sdk = { path = "../holocron-plugin-sdk", editable = true }
excel-connector = { path = "../connector-excel", editable = true }
excel-exporter = { path = "../exporter-excel", editable = true }
csv-connector = { path = "../connector-csv", editable = true }
data-dictionary-markdown = { path = "../exporter-markdown", editable = true }
lineage-gap-audit = { path = "../audit-lineage-gaps", editable = true }
compliance-report = { path = "../compliance-report", editable = true }
pii-detector = { path = "../pii-detector", editable = true }
postgres-connector = { path = "../connector-postgres", editable = true }
powerbi-connector = { path = "../connector-powerbi", editable = true }

[project.optional-dependencies]
dev = [
    "pytest>=8.3.0",
    "pytest-asyncio>=0.24.0",
    "pytest-cov>=6.0.0",
    "httpx>=0.28.0",
    "mypy>=1.13.0",
    "ruff>=0.8.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/holocron"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"

[tool.mypy]
python_version = "3.12"
strict = true
warn_return_any = true
warn_unused_ignores = true
disallow_untyped_defs = true
disallow_incomplete_defs = true
check_untyped_defs = true
disallow_any_generics = true
ignore_missing_imports = true
disallow_untyped_decorators = false  # Allow untyped decorators (slowapi, etc.)

[tool.ruff]
target-version = "py312"
line-length = 100

[tool.ruff.lint]
select = [
    "E",      # pycodestyle errors
    "W",      # pycodestyle warnings
    "F",      # pyflakes
    "I",      # isort
    "B",      # flake8-bugbear
    "C4",     # flake8-comprehensions
    "UP",     # pyupgrade
    "ARG",    # flake8-unused-arguments
    "SIM",    # flake8-simplify
]
ignore = [
    "E501",   # line too long (handled by formatter)
    "B008",   # function call in default argument (common FastAPI pattern for Query/Depends)
    "B024",   # abstract base class without abstract methods (stubs are OK)
    "ARG001", # unused arguments (common with FastAPI decorators like slowapi limiter)
]

[tool.ruff.lint.isort]
known-first-party = ["holocron"]

[tool.coverage.run]
source = ["src/holocron"]
branch = true

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "if TYPE_CHECKING:",
    "raise NotImplementedError",
]
