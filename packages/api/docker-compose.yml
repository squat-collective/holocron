services:
  holocron:
    build: .
    ports:
      - "8000:8000"
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=holocron
      - API_DEBUG=true
    depends_on:
      neo4j:
        condition: service_healthy
    networks:
      - holocron
    volumes:
      # Mount source for development (hot reload + formatting)
      - ./src:/app/src
      # Mount plugins
      - ./plugins:/app/plugins
      # Mount tests
      - ./tests:/app/tests
      # Mount pyproject.toml for linter config
      - ./pyproject.toml:/app/pyproject.toml
    develop:
      watch:
        - action: sync
          path: ./src
          target: /app/src
        - action: rebuild
          path: pyproject.toml

  neo4j:
    image: neo4j:5
    ports:
      - "7474:7474"  # Browser UI
      - "7687:7687"  # Bolt protocol
    environment:
      - NEO4J_AUTH=neo4j/holocron
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_apoc_export_file_enabled=true
      - NEO4J_apoc_import_file_enabled=true
    networks:
      - holocron
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

networks:
  holocron:
    name: holocron
    driver: bridge

volumes:
  neo4j_data:
  neo4j_logs:
