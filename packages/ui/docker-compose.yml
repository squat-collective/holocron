# Holocron Portal - Development Environment
# Usage: podman-compose up -d

services:
  dev:
    image: oven/bun:1
    container_name: holocron-portal-dev
    working_dir: /app
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    ports:
      - "3333:3000"
    environment:
      - HOLOCRON_API_URL=${HOLOCRON_API_URL:-http://holocron:8000}
      - NODE_ENV=development
    command: sleep infinity
    # Keep container running for interactive use
    # Use: podman exec -it holocron-portal-dev bash
    networks:
      - holocron
    # Resource caps — 6 GB leaves comfortable headroom for `bun run dev` +
    # Next.js compile without getting OOM-killed. Lower if you need to
    # free up RAM for other containers.
    mem_limit: 6g
    memswap_limit: 6g
    cpus: "2"
    pids_limit: 512

networks:
  holocron:
    external: true
    # Connect to existing holocron network
    # Create if not exists: podman network create holocron

volumes:
  node_modules:
    # Persist node_modules for faster rebuilds
