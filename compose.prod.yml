name: holocron

# Production stack — pulls pre-built images from GHCR. No source mounts,
# no live reload, no dev extras. Pair with `.env` (copy `.env.example`).
#
# Usage:
#   cp .env.example .env && edit .env
#   docker compose -f compose.prod.yml up -d

services:
  neo4j:
    image: neo4j:5
    restart: unless-stopped
    ports:
      - "${NEO4J_HTTP_PORT:-7474}:7474"
      - "${NEO4J_BOLT_PORT:-7687}:7687"
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD:?NEO4J_PASSWORD must be set in .env}
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_apoc_export_file_enabled=true
      - NEO4J_apoc_import_file_enabled=true
    networks:
      - holocron
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  api:
    image: ghcr.io/${HOLOCRON_IMAGE_OWNER:-squat-collective}/holocron-api:${HOLOCRON_VERSION:-latest}
    restart: unless-stopped
    ports:
      - "${API_PORT:-8100}:8000"
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=${NEO4J_PASSWORD}
      - API_DEBUG=false
    depends_on:
      neo4j:
        condition: service_healthy
    networks:
      - holocron
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  ui:
    image: ghcr.io/${HOLOCRON_IMAGE_OWNER:-squat-collective}/holocron-ui:${HOLOCRON_VERSION:-latest}
    restart: unless-stopped
    ports:
      - "${UI_PORT:-3333}:3000"
    environment:
      - HOLOCRON_API_URL=http://api:8000
      - NODE_ENV=production
    depends_on:
      api:
        condition: service_healthy
    networks:
      - holocron

networks:
  holocron:
    name: holocron
    driver: bridge

volumes:
  neo4j_data:
  neo4j_logs:
