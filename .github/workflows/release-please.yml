name: Release Please

# Watches main, opens (and continuously updates) a "release-please" PR
# that bumps the version + regenerates CHANGELOG.md from conventional-
# commit subjects since the last tag. When that PR is squash-merged the
# action creates the GitHub Release + tag, then dispatches the existing
# `release.yml` workflow to build and push the multi-arch images.
#
# Why the explicit dispatch step: tags created via GITHUB_TOKEN don't
# fire `on: push: tags` triggers (GitHub's loop-prevention). The dispatch
# call uses workflow_dispatch, which IS allowed to chain — so the build
# pipeline runs on the tag release-please just cut.

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  actions: write  # needed to dispatch release.yml

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
      tag_name: ${{ steps.rp.outputs.tag_name }}
    steps:
      - name: Run release-please
        id: rp
        uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  trigger-release:
    name: Build & publish images for ${{ needs.release-please.outputs.tag_name }}
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch release.yml on the new tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run release.yml \
            --repo "${GITHUB_REPOSITORY}" \
            --ref "${{ needs.release-please.outputs.tag_name }}" \
            -f tag="${{ needs.release-please.outputs.tag_name }}"
