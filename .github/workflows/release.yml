name: Release

# Tagging `vX.Y.Z` cuts a release: builds + pushes API and UI images to GHCR
# (multi-arch), creates a GitHub Release with the install instructions.
on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Version tag to publish (e.g. v0.1.0). Must already exist."
        required: true

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: ${{ github.repository_owner }}

jobs:
  build-and-push:
    name: Build & push ${{ matrix.image }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: holocron-api
            dockerfile: packages/api/Dockerfile
          - image: holocron-ui
            dockerfile: packages/ui/Dockerfile
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Resolve version
        id: version
        run: |
          ref="${{ inputs.tag || github.ref_name }}"
          version="${ref#v}"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$ref" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ matrix.image }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.version.outputs.tag }}
            type=raw,value=${{ steps.version.outputs.version }}
            type=sha,prefix=sha-
          labels: |
            org.opencontainers.image.title=${{ matrix.image }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
            org.opencontainers.image.licenses=MIT

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}

  release:
    name: Create GitHub Release
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: version
        run: |
          ref="${{ github.ref_name }}"
          echo "version=${ref#v}" >> "$GITHUB_OUTPUT"
          echo "tag=$ref" >> "$GITHUB_OUTPUT"

      - name: Generate release notes
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: |
            compose.prod.yml
            compose.prod.caddy.yml
            .env.example
            install.sh
          body: |
            ## Install

            ```bash
            curl -fsSL https://github.com/${{ github.repository }}/releases/download/${{ steps.version.outputs.tag }}/install.sh | bash
            ```

            Or pin to this version:

            ```bash
            curl -fsSL https://github.com/${{ github.repository }}/releases/download/${{ steps.version.outputs.tag }}/install.sh | HOLOCRON_VERSION=${{ steps.version.outputs.tag }} bash
            ```

            ## Images

            - `ghcr.io/${{ env.IMAGE_OWNER }}/holocron-api:${{ steps.version.outputs.tag }}`
            - `ghcr.io/${{ env.IMAGE_OWNER }}/holocron-ui:${{ steps.version.outputs.tag }}`

            Both built for `linux/amd64` and `linux/arm64`.
